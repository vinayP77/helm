
apiVersion: v1
kind: Service
metadata:
  name: nginx
spec:
  type: LoadBalancer          # ✅ FIX 1
  selector:                   # ✅ FIX 2 (match pod labels)
    app: nginx
    tier: frontend
    purpose: deployment
  
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: {{ .Values.service.nodePort }}    # optional                    